<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – HUGPONG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    body {
      background: #f4f6f2;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(45, 80, 22, 0.1);
      border: 1px solid var(--border);
      text-align: center;
    }
    .login-logo {
      width: 100px;
      height: 100px;
      margin-bottom: 24px;
    }
    .login-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: #fdfdfd;
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(45, 80, 22, 0.05);
    }
    .login-btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    .login-btn:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }
    .forgot-pass {
      display: block;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
    }
    .forgot-pass:hover {
      color: var(--primary);
    }
    .back-link {
      position: absolute;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .back-link:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5m7 7l-7-7 7-7"/></svg>
    Back to Home
  </a>

  <div class="login-card">
    <img src="logo.png" alt="HUGPONG Logo" class="login-logo">
    <h1 class="login-title">Admin Console</h1>
    <p class="login-subtitle">Enter your credentials to manage Silay Farm operations.</p>

    <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" placeholder="admin@hugpong.ph" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="login-btn">Sign In</button>
      
      <a href="#" class="forgot-pass">Forgot password?</a>
    </form>
  </div>
</body>
</html>
