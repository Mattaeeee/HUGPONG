<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – HUGPONG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-bg: #F2F4EF;
      --color-primary: #2D5016;
      --color-primary-light: #4A7C2F;
      --color-primary-bg: #E8F0E0;
      --color-accent: #F5A623;
      --color-border: #E2E8DC;
      --color-hug-text: #1A2212;
      --color-hug-text2: #5A6B4A;
      --color-hug-muted: #8A9B7A;
      --font-sans: 'Inter', system-ui, sans-serif;
    }
    body {
      font-family: var(--font-sans);
    }
  </style>
</head>
<body class="min-h-screen bg-bg flex items-center justify-center relative">

  <!-- Back to Home -->
  <a href="index.html" class="absolute top-5 left-5 flex items-center gap-1.5 text-sm text-hug-text2 font-medium hover:text-primary transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
    Back to Home
  </a>

  <!-- Login Card -->
  <div class="max-w-sm w-full bg-white rounded-2xl shadow-xl border border-border p-10 mx-4">

    <!-- Logo + Heading -->
    <div class="flex flex-col items-center gap-3 mb-7">
      <img src="logo.png" alt="HUGPONG Logo" class="w-20 h-20 object-contain" />
      <div class="text-center">
        <h1 class="text-2xl font-black text-primary leading-tight">Admin Console</h1>
        <p class="text-sm text-hug-muted mt-1 leading-snug">Enter your credentials to manage Silay Farm operations.</p>
      </div>
    </div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLoginSubmit(event)" class="flex flex-col gap-4" novalidate>

      <!-- Contact Number -->
      <div class="flex flex-col gap-1.5">
        <label for="contact-input" class="text-xs font-semibold text-hug-text2 uppercase tracking-wide">Contact Number</label>
        <input
          type="tel"
          id="contact-input"
          pattern="^09\d{9}$"
          placeholder="09XX XXX XXXX"
          required
          class="w-full rounded-xl border border-border bg-bg px-4 py-3 text-sm text-hug-text placeholder-hug-muted outline-none focus:border-primary focus:ring-2 focus:ring-primary-bg transition-all"
        />
      </div>

      <!-- Password -->
      <div class="flex flex-col gap-1.5">
        <label for="password-input" class="text-xs font-semibold text-hug-text2 uppercase tracking-wide">Password</label>
        <input
          type="password"
          id="password-input"
          placeholder="••••••••"
          required
          class="w-full rounded-xl border border-border bg-bg px-4 py-3 text-sm text-hug-text placeholder-hug-muted outline-none focus:border-primary focus:ring-2 focus:ring-primary-bg transition-all"
        />
      </div>

      <!-- Submit Button -->
      <button
        id="submit-btn"
        type="submit"
        class="mt-1 w-full bg-primary hover:bg-primary-light text-white font-bold text-sm rounded-xl py-3.5 transition-colors flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed"
      >
        <span id="btn-spinner" class="btn-spinner"></span>
        <span id="btn-text">Sign In</span>
      </button>

      <!-- Forgot Password -->
      <div class="text-center mt-1">
        <a href="#" class="text-xs text-hug-muted hover:text-primary transition-colors">Forgot password? Contact your administrator.</a>
      </div>

    </form>

    <!-- Demo Presets -->
    <div class="mt-7 pt-6 border-t border-dashed border-border">
      <p class="text-[10px] font-bold text-hug-muted uppercase tracking-widest text-center mb-3">Quick Demo Access</p>
      <div class="grid grid-cols-2 gap-3">

        <!-- SRA Checker -->
        <button
          onclick="triggerDemoLogin('admin')"
          class="flex flex-col items-start gap-1.5 bg-primary-bg border border-border rounded-xl p-3 text-left hover:border-primary hover:shadow-sm transition-all cursor-pointer"
        >
          <span class="text-[10px] font-bold text-primary bg-white border border-primary/30 rounded-full px-2 py-0.5 uppercase tracking-wide">SRA Checker</span>
          <p class="text-xs font-semibold text-hug-text leading-tight">Admin Console</p>
          <p class="text-[10px] text-hug-muted font-mono">09171234567</p>
        </button>

        <!-- Super Admin -->
        <button
          onclick="triggerDemoLogin('superadmin')"
          class="flex flex-col items-start gap-1.5 bg-purple-50 border border-border rounded-xl p-3 text-left hover:border-purple-400 hover:shadow-sm transition-all cursor-pointer"
        >
          <span class="text-[10px] font-bold text-purple-700 bg-white border border-purple-300 rounded-full px-2 py-0.5 uppercase tracking-wide">Super Admin</span>
          <p class="text-xs font-semibold text-hug-text leading-tight">Root Console</p>
          <p class="text-[10px] text-hug-muted font-mono">09187654321</p>
        </button>

      </div>
    </div>

  </div>
  <!-- /Login Card -->

  <!-- Loading Overlay -->
  <div
    id="loading-overlay"
    class="fixed inset-0 bg-bg/85 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-all duration-400"
  >
    <div class="flex flex-col items-center gap-5 text-center px-6">
      <div class="w-14 h-14 border-4 border-primary-bg border-t-primary rounded-full overlay-spinner"></div>
      <div>
        <p class="text-base font-bold text-hug-text">Signing you in…</p>
        <p id="overlay-status" class="text-sm text-hug-muted mt-1 transition-all">Verifying credentials…</p>
      </div>
    </div>
  </div>

  <script>
    function triggerDemoLogin(role) {
      document.getElementById('contact-input').value = role === 'admin' ? '09171234567' : '09187654321';
      document.getElementById('password-input').value = role === 'admin' ? 'admin123' : 'superadmin123';
      localStorage.setItem('hugpong_role', role);
      setTimeout(() => document.getElementById('login-form').dispatchEvent(new Event('submit', { cancelable: true })), 300);
    }

    function handleLoginSubmit(e) {
      e.preventDefault();
      const contactNum = document.getElementById('contact-input').value;
      const spinner = document.getElementById('btn-spinner');
      const btnText = document.getElementById('btn-text');
      const submitBtn = document.getElementById('submit-btn');
      const overlay = document.getElementById('loading-overlay');
      const statusText = document.getElementById('overlay-status');
      if (!localStorage.getItem('hugpong_role')) {
        localStorage.setItem('hugpong_role', contactNum === '09187654321' ? 'superadmin' : 'admin');
      }
      spinner.style.display = 'inline-block';
      btnText.textContent = 'Authenticating...';
      submitBtn.disabled = true;
      setTimeout(() => {
        overlay.classList.remove('opacity-0', 'pointer-events-none');
        overlay.classList.add('opacity-100', 'pointer-events-auto');
        setTimeout(() => { statusText.textContent = 'Decrypting access tokens...'; }, 400);
        setTimeout(() => { statusText.textContent = 'Synchronizing SRA weekly prices...'; }, 800);
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1300);
      }, 300);
    }
  </script>

</body>
</html>
